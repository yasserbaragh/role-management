spring.application.name=role-management
spring.profiles.active=local
spring.docker.compose.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.config.fallback-to-no-op-cache=false
spring.cache.redis.enable-transaction-support=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
app.email-verification.enabled=${EMAIL_VERIFICATION_ENABLED:false}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true